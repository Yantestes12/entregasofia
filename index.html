<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Processando...</title>

  <!-- Meta Pixel Code -->
  <script>
    !function(f,b,e,v,n,t,s){
      if(f.fbq) return;
      n=f.fbq=function(){
        n.callMethod ? n.callMethod.apply(n,arguments) : n.queue.push(arguments);
      };
      if(!f._fbq) f._fbq=n;
      n.push=n;
      n.loaded=!0;
      n.version='2.0';
      n.queue=[];
      t=b.createElement(e);
      t.async=!0;
      t.src=v;
      s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s);
    }(window, document, 'script', 'https://connect.facebook.net/en_US/fbevents.js');

    // Inicializa o Pixel
    fbq('init', '1734892147494763');

    // 1) PageView — dispara sempre
    fbq('track', 'PageView');

    document.addEventListener("DOMContentLoaded", function () {
      const purchaseKey = "purchase_pixel_fired";

      // 2) Purchase — dispara apenas uma vez
      if (!localStorage.getItem(purchaseKey)) {
        var eventID = 'purchase_' + Date.now();

        fbq('track', 'Purchase', {
          value: 10.00,
          currency: 'BRL'
        }, {
          eventID: eventID
        });

        localStorage.setItem(purchaseKey, "true");
      }

      // Redirecionamento após 2 segundos
      setTimeout(function () {
        window.location.replace("https://sofia-vip.vercel.app/");
      }, 2000);
    });
  </script>

  <!-- Noscript fallback do Pixel -->
  <noscript>
    <img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=1734892147494763&ev=PageView&noscript=1" />
  </noscript>

  <!-- Fallback caso o JavaScript esteja desativado -->
  <meta http-equiv="refresh" content="3;url=https://sofia-vip.vercel.app/" />
</head>
<body style="margin:0; display:flex; align-items:center; justify-content:center; height:100vh; font-family:Arial, sans-serif; background:#f5f5f5;">
  <div style="text-align:center;">
    <h2>Processando pagamento...</h2>
    <p>Você será redirecionado em instantes.</p>
    <p>Caso não seja redirecionado automaticamente,
      <a href="https://sofia-vip.vercel.app/">clique aqui</a>.
    </p>
  </div>
</body>
</html>
